  <!-- 微笑曲线 -->
  <path d="M74 126 Q100 146 126 126" stroke="#000" stroke-width="4" fill="none" stroke-linecap="round"/>
  <!-- 左腮红 -->
  <ellipse cx="55" cy="110" rx="12" ry="8" fill="#FF69B4" opacity="0.6"/>
  <!-- 右腮红 -->
  <ellipse cx="145" cy="110" rx="12" ry="8" fill="#FF69B4" opacity="0.6"/>
